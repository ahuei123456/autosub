services:
  autosub:
    image: ${AUTOSUB_IMAGE:-autosub:latest}
    volumes:
      - ${AUTOSUB_PROJECTS_DIR:-./projects}:/projects
    environment:
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:?Set GOOGLE_CLOUD_PROJECT in .env or environment}
      - AUTOSUB_GCS_BUCKET=${AUTOSUB_GCS_BUCKET:-}
